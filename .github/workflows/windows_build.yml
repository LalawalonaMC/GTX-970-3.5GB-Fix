name: Build VRAM Fix
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    # 1. Install Vulkan SDK using a modern, maintained action
    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        vulkan_version: latest
        # This action uses v4 of the cache, so it won't trigger the error
        cache: true 

    # 2. Configure CMake
    # The action above automatically sets the VULKAN_SDK environment variable
    - name: Configure CMake
      run: cmake -S . -B build -A x64

    # 3. Build Project
    - name: Build Project
      run: cmake --build build --config Release

    # 4. Upload Artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GTX-970-3.5GB-Fix-Binaries
        path: |
          build/Release/GTX970Fix.dll
          build/Release/VramTest.exe
          GTX970Fix.json
