name: Build VRAM Fix
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    # 1. Install the Vulkan SDK on the runner
    # We set vulkan-use-cache to false to avoid the deprecated v2 cache error.
    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.0
      with:
        vulkan-query-version: latest
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: false 

    # 2. Configure CMake
    # Explicitly using 'shell: bash' or 'pwsh' helps ensure 
    # the VULKAN_SDK env var set by the previous step is picked up.
    - name: Configure CMake
      shell: bash
      run: cmake -S . -B build -A x64

    # 3. Build Project
    - name: Build Project
      run: cmake --build build --config Release

    # 4. Upload Artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GTX-970-3.5GB-Fix-Binaries
        path: |
          build/Release/GTX970Fix.dll
          build/Release/VramTest.exe
          GTX970Fix.json
