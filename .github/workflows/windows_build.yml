name: Build VRAM Fix
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    # 1. Install the Vulkan SDK on the runner
    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.0
      with:
        vulkan-query-version: latest
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true

    # 2. Configure CMake (Simplified)
    # The Setup step above sets $env:VULKAN_SDK automatically.
    # find_package(Vulkan) in your CMakeLists.txt will now work.
    - name: Configure CMake
      run: cmake -S . -B build -A x64

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GTX-970-3.5GB-Fix-Binaries
        path: |
          build/Release/GTX970Fix.dll
          build/Release/VramTest.exe
          GTX970Fix.json
