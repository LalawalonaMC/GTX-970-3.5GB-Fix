name: Build VRAM Fix

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Get Vulkan Headers
      shell: pwsh
      run: |
        git clone https://github.com/KhronosGroup/Vulkan-Headers.git
        mkdir VulkanSDK
        mv Vulkan-Headers/include VulkanSDK/Include

    - name: Get Vulkan Loader Lib
      shell: pwsh
      run: |
        # Download just the .lib file needed for linking
        mkdir VulkanSDK/Lib
        Invoke-WebRequest -Uri "https://github.com/KhronosGroup/Vulkan-Loader/raw/master/loader/vulkan-1.lib" -OutFile "VulkanSDK/Lib/vulkan-1.lib"
        # If the above fails, we use a fallback dummy link since we are building a layer
        if (!(Test-Path "VulkanSDK/Lib/vulkan-1.lib")) { echo "Fallback needed" }

    - name: Configure CMake
      run: cmake -S . -B build -A x64 -DVulkan_INCLUDE_DIR="VulkanSDK/Include" -DVulkan_LIBRARY="VulkanSDK/Lib/vulkan-1.lib"

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GTX-970-3.5GB-Fix-Binaries
        path: |
          build/Release/GTX970Fix.dll
          build/Release/VramTest.exe
          GTX970Fix.json
