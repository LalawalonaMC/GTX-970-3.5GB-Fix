name: Build VRAM Fix

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      shell: pwsh
      run: |
        # Use the Vulkan SDK that is pre-installed on the runner image
        $VulkanRoot = $env:VULKAN_SDK
        cmake -S . -B build -A x64 `
          -DVulkan_INCLUDE_DIR="$VulkanRoot/Include" `
          -DVulkan_LIBRARY="$VulkanRoot/Lib/vulkan-1.lib"

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GTX-970-3.5GB-Fix-Binaries
        path: |
          build/Release/GTX970Fix.dll
          build/Release/VramTest.exe
          GTX970Fix.json
