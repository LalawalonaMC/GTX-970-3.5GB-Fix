name: Build VRAM Fix

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download Vulkan Headers and Loader
      shell: pwsh
      run: |
        # Download the specific SDK components directly from LunarG
        Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.zip" -OutFile "vulkan-sdk.zip"
        Expand-Archive -Path "vulkan-sdk.zip" -DestinationPath "VulkanSDK"

    - name: Configure CMake
      shell: pwsh
      run: |
        # Tell CMake exactly where the headers and libs are
        $VulkanPath = "$(Get-Location)/VulkanSDK"
        cmake -S . -B build -A x64 `
          -DVulkan_INCLUDE_DIR="$VulkanPath/Include" `
          -DVulkan_LIBRARY="$VulkanPath/Lib/vulkan-1.lib"

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GTX-970-3.5GB-Fix-Binaries
        path: |
          build/Release/GTX970Fix.dll
          build/Release/VramTest.exe
          GTX970Fix.json
